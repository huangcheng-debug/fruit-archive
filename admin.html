<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 - 水果知识档案</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- 百度统计 -->
  <script>
  var _hmt = _hmt || [];
  (function() {
    var hm = document.createElement("script");
    hm.src = "https://hm.baidu.com/hm.js?07d7c2fc8be136621a1b8f393350ff4c";
    var s = document.getElementsByTagName("script")[0]; 
    s.parentNode.insertBefore(hm, s);
  })();
  </script>
</head>
<body>
  <!-- 顶部导航栏 -->
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="header-logo">
        <span class="logo-icon">🍎</span>
        <span>水果知识档案</span>
      </a>
      <div class="header-actions">
        <a href="index.html" class="btn btn-outline btn-sm" title="返回首页">🏠 返回首页</a>
      </div>
    </div>
  </header>

  <!-- 管理面板 -->
  <main class="admin-container">
    <!-- 工具栏 -->
    <div class="admin-toolbar">
      <h1 class="toolbar-title">⚙️ 管理后台</h1>
      <div class="toolbar-actions">
        <button class="btn btn-primary" id="btnAdd" title="添加新水果">＋ 添加水果</button>
        <button class="btn btn-outline" id="btnExport" title="导出数据">📥 导出 JSON</button>
        <button class="btn btn-outline" id="btnImport" title="导入数据">📤 导入 JSON</button>
        <button class="btn btn-danger" id="btnReset" title="重置为默认数据">🔄 重置数据</button>
      </div>
    </div>

    <!-- 搜索 -->
    <div style="margin-bottom: var(--space-md);">
      <div class="search-bar" style="max-width: 360px; margin: 0;">
        <span class="search-icon">🔍</span>
        <input 
          type="text" 
          id="adminSearch" 
          placeholder="搜索水果名称..."
          autocomplete="off"
        >
      </div>
    </div>

    <!-- 数据表格 -->
    <div class="admin-table-wrap">
      <table class="admin-table">
        <thead>
          <tr>
            <th style="width:50px;">#</th>
            <th>水果名称</th>
            <th>分类</th>
            <th>季节</th>
            <th>产地</th>
            <th>状态</th>
            <th style="width:120px;">操作</th>
          </tr>
        </thead>
        <tbody id="adminTableBody">
          <!-- 由 JS 动态渲染 -->
        </tbody>
      </table>
      <div class="empty-state" id="adminEmpty" style="display:none;">
        <div class="empty-icon">📋</div>
        <p class="empty-text">没有匹配的水果数据</p>
      </div>
    </div>

    <div class="result-count" style="margin-top: var(--space-sm);" id="adminCount">
      共 <strong>0</strong> 种水果
    </div>

    <!-- 隐藏的文件选择器 -->
    <input type="file" id="importFile" accept=".json" style="display:none;">
  </main>

  <!-- 编辑弹窗 -->
  <div class="editor-overlay" id="editorOverlay" style="display:none;">
    <div class="editor-panel" id="editorPanel">
      <div class="editor-header">
        <h3 id="editorTitle">添加水果</h3>
        <button class="editor-close" id="editorClose">✕</button>
      </div>
      <div class="editor-body">
        <form id="editorForm">
          <div class="form-row">
            <div class="form-group">
              <label for="edName">水果名称 *</label>
              <input type="text" id="edName" required placeholder="如：苹果">
            </div>
            <div class="form-group">
              <label for="edEmoji">Emoji 图标</label>
              <input type="text" id="edEmoji" placeholder="如：🍎" maxlength="4">
            </div>
          </div>
          <div class="form-group">
            <label for="edScientific">学名</label>
            <input type="text" id="edScientific" placeholder="如：Malus domestica">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="edCategory">分类 *</label>
              <select id="edCategory">
                <option value="">请选择分类</option>
                <option value="仁果类">仁果类</option>
                <option value="热带水果">热带水果</option>
                <option value="柑橘类">柑橘类</option>
                <option value="浆果类">浆果类</option>
                <option value="核果类">核果类</option>
                <option value="瓜果类">瓜果类</option>
              </select>
            </div>
            <div class="form-group">
              <label for="edSeason">季节</label>
              <input type="text" id="edSeason" placeholder="如：秋季">
            </div>
          </div>
          <div class="form-group">
            <label for="edRegion">产地</label>
            <input type="text" id="edRegion" placeholder="如：温带">
          </div>
          <div class="form-group">
            <label for="edSummary">概述</label>
            <textarea id="edSummary" rows="2" placeholder="简短概述水果特点..."></textarea>
          </div>
          <div class="form-group">
            <label for="edDescription">详细介绍</label>
            <textarea id="edDescription" rows="3" placeholder="详细描述水果信息..."></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="edCalories">热量 (kcal/100g)</label>
              <input type="number" id="edCalories" step="0.1" placeholder="如：52">
            </div>
            <div class="form-group">
              <label for="edVitaminC">维生素C (mg/100g)</label>
              <input type="number" id="edVitaminC" step="0.1" placeholder="如：4.6">
            </div>
          </div>
          <div class="form-group">
            <label for="edFiber">膳食纤维 (g/100g)</label>
            <input type="number" id="edFiber" step="0.1" placeholder="如：2.4">
          </div>
          <div class="form-group">
            <label for="edNutrients">营养元素（逗号分隔）</label>
            <input type="text" id="edNutrients" placeholder="如：维生素C, 膳食纤维, 钾">
          </div>
          <div class="form-group">
            <label for="edFunFact">趣味冷知识</label>
            <textarea id="edFunFact" rows="2" placeholder="有趣的冷知识..."></textarea>
          </div>
          <div class="form-group">
            <label for="edStatus">发布状态</label>
            <select id="edStatus">
              <option value="published">已发布</option>
              <option value="draft">草稿</option>
            </select>
          </div>
        </form>
      </div>
      <div class="editor-footer">
        <button class="btn btn-outline" id="editorCancel">取消</button>
        <button class="btn btn-primary" id="editorSave">💾 保存</button>
      </div>
    </div>
  </div>

  <!-- Toast 容器 -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="js/data.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
