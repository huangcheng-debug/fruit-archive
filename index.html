<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>水果知识档案 🍎</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- 百度统计 -->
  <script>
  var _hmt = _hmt || [];
  (function() {
    var hm = document.createElement("script");
    hm.src = "https://hm.baidu.com/hm.js?07d7c2fc8be136621a1b8f393350ff4c";
    var s = document.getElementsByTagName("script")[0]; 
    s.parentNode.insertBefore(hm, s);
  })();
  </script>
</head>
<body>
  <!-- 顶部导航栏 -->
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="header-logo">
        <span class="logo-icon">🍎</span>
        <span>水果知识档案</span>
      </a>
      
      <!-- 搜索栏 -->
      <div class="search-bar" id="searchBar">
        <span class="search-icon">🔍</span>
        <input 
          type="text" 
          id="searchInput" 
          placeholder="搜索水果名称、学名、特点..."
          autocomplete="off"
        >
        <button class="search-clear" id="searchClear" style="display:none;" title="清除搜索">✕</button>
      </div>
      
      <div class="header-actions">
        <a href="admin.html" class="btn btn-outline btn-sm" title="管理后台">⚙️ 管理</a>
      </div>
    </div>
  </header>

  <!-- 主内容区 -->
  <main class="main-container">
    <!-- 多维筛选面板 -->
    <div class="filter-panel" id="filterPanel">
      <!-- 水果种类 -->
      <div class="filter-group">
        <label class="filter-label">🍎 种类</label>
        <div class="filter-chips" id="filterCategory">
          <!-- JS 动态填充 -->
        </div>
      </div>
      <!-- 季节 -->
      <div class="filter-group">
        <label class="filter-label">📅 季节</label>
        <div class="filter-chips" id="filterSeason">
          <!-- JS 动态填充 -->
        </div>
      </div>
      <!-- 产地 -->
      <div class="filter-group">
        <label class="filter-label">🌍 产地</label>
        <div class="filter-chips" id="filterRegion">
          <!-- JS 动态填充 -->
        </div>
      </div>
      <button class="filter-reset" id="filterReset">🔄 重置筛选</button>
    </div>

    <!-- 结果计数 -->
    <div class="filter-bar">
      <span class="result-count" id="resultCount">
        共 <strong>50</strong> 种水果
      </span>
    </div>

    <!-- 水果卡片列表 -->
    <div class="fruit-grid" id="fruitGrid">
      <!-- 由 JS 动态渲染 -->
    </div>

    <!-- 空状态 -->
    <div class="empty-state" id="emptyState" style="display:none;">
      <div class="empty-icon">🔍</div>
      <p class="empty-text">没有找到相关水果，试试其他关键词吧</p>
    </div>
  </main>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
